<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>오뚜기 입금표</title>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="입금표"/>
<meta name="theme-color" content="#000000"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#fff;padding:10px;}
.wrap{background:#fff;border:1px solid #999;border-radius:4px;overflow:hidden;max-width:900px;margin:0 auto;}

.hd{background:#fff;color:#000;border-bottom:2px solid #000;padding:10px 14px 8px;}
.hd-top{display:flex;justify-content:space-between;align-items:center;}
.hd h1{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.hd .fax{font-size:11px;}
.hd-sub{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.hd-sub input{background:#fff;border:1px solid #555;color:#000;font-size:11px;font-weight:700;outline:none;text-align:center;border-radius:4px;padding:2px 4px;}
#doc-date{width:72px;}
#customer-name{width:100px;}

.confirmed-banner{display:none;background:#eee;color:#000;font-size:11px;font-weight:700;text-align:center;padding:5px;border-bottom:1px solid #999;}
.confirmed .confirmed-banner{display:block;}

.add-section{padding:7px 10px;background:#fff;border-bottom:1px solid #ccc;position:relative;}
.add-section input{width:100%;padding:7px 12px;border:1px solid #777;border-radius:4px;font-size:13px;outline:none;}
.ac-list{position:absolute;left:10px;right:10px;background:#fff;border:1px solid #777;border-top:none;border-radius:0 0 4px 4px;z-index:100;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 8px rgba(0,0,0,.15);}
.ac-list div{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid #eee;}
.ac-list div:active{background:#eee;}

/* 표 — table-layout:fixed로 열 크기 조정 가능 */
.tbl-wrap{overflow-x:auto;padding:0;}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;}
thead tr{background:#fff;color:#000;}
thead th{
  padding:6px 5px;font-weight:700;text-align:center;
  border:1px solid #555;white-space:nowrap;
  position:relative;overflow:hidden;
  user-select:none;
}
thead th.th-final{font-size:12px;font-weight:900;border:2px solid #000;}
/* 열 크기 조정 핸들 */
.col-resize{
  position:absolute;right:0;top:0;bottom:0;width:6px;
  cursor:col-resize;background:transparent;z-index:10;
}
.col-resize:hover{background:rgba(0,0,0,.25);}

tbody tr{border-bottom:1px solid #ccc;}
tbody tr:nth-child(even){background:#f5f5f5;}
tbody td{padding:4px 5px;border:1px solid #ccc;text-align:center;vertical-align:middle;overflow:hidden;}
tbody td.name-cell{text-align:left;font-weight:600;color:#000;font-size:11px;}
tbody td input{width:100%;border:none;background:transparent;font-size:11px;text-align:right;outline:none;color:#000;padding:0 2px;}
tbody td input.final-inp{color:#000;font-weight:900;font-size:13px;}
tbody td input[readonly]{color:#333;}
.td-total input{color:#000;font-weight:700;}
.td-final{border-left:2px solid #000;border-right:2px solid #000;}
.vat-badge{font-size:9px;padding:1px 4px;border:1px solid #999;border-radius:2px;font-weight:700;display:inline-block;}
.vat-과세{background:#fff;color:#000;}
.vat-면세{background:#eee;color:#000;}
.del-btn{background:none;border:none;color:#999;font-size:13px;cursor:pointer;padding:0;line-height:1;}
.del-btn:active{color:#000;}

.sum-row-tr td{background:#f0f0f0;font-weight:700;font-size:11px;padding:5px;}
.sum-row-tr td.lbl{text-align:right;color:#333;}
.sum-row-tr td.val{text-align:right;color:#000;}
.grand-tr td{background:#fff;color:#000;font-weight:800;font-size:12px;padding:6px 5px;border-top:2px solid #000;}
.grand-tr td.lbl{text-align:right;}
.grand-tr input{color:#000;font-weight:800;font-size:12px;background:transparent;border:none;outline:none;width:100%;text-align:right;}

.payment{margin:8px 10px 10px;border:1px solid #777;border-radius:4px;overflow:hidden;}
.pay-row{display:flex;}
.pay-box{flex:1;padding:8px 12px;background:#fff;border-right:1px solid #ccc;}
.pay-box.dark{background:#eee;}
.pay-box .lbl{font-size:10px;color:#555;margin-bottom:3px;}
.pay-box.dark .lbl{color:#333;}
.pay-box input{border:none;border-bottom:1px solid #777;font-size:14px;font-weight:800;color:#000;width:100%;outline:none;background:transparent;}
.pay-box.dark input{border-bottom-color:#333;color:#000;font-size:15px;}
.pay-note{font-size:10px;color:#555;padding:4px 12px;background:#f5f5f5;border-top:1px solid #ccc;}
.bank-row{padding:5px 12px 8px;background:#fff;display:flex;align-items:center;gap:6px;font-size:11px;color:#333;border-top:1px solid #ccc;}
.bank-row input{border:none;border-bottom:1px solid #999;font-size:12px;outline:none;background:transparent;color:#000;}
#bank-name{width:80px;font-weight:700;}
#bank-acc{width:160px;}

.btn-wrap{padding:6px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.btn-wrap:last-child{padding-bottom:12px;}
.btn{flex:1;min-width:60px;padding:9px 4px;border:1px solid #777;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;color:#000;}
.btn:active{opacity:.6;}
.btn-confirm{background:#000;color:#fff;border-color:#000;}
.btn-edit{background:#555;color:#fff;border-color:#555;display:none;}
.btn-img{background:#333;color:#fff;border-color:#333;}
.btn-excel{background:#fff;color:#000;border-color:#555;}
.btn-share{background:#fff;color:#000;border-color:#555;}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:center;flex-direction:column;gap:12px;}
#overlay.show{display:flex;}
#overlay p{color:#fff;font-size:14px;font-weight:700;}
.spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media print{
  body{background:#fff;padding:0;}
  .wrap{box-shadow:none;border-radius:0;}
  .btn-wrap,.add-section,#overlay{display:none!important;}
}
</style>
</head>

<div id="overlay"><div class="spinner"></div><p id="ov-txt">처리 중...</p></div>

<div class="wrap" id="main-card">
  <div class="confirmed-banner">✅ 확정됨 — 수정하려면 [수정하기] 버튼을 누르세요</div>

  <div class="hd">
    <div class="hd-top">
      <h1>오뚜기 거래처 입금표</h1>
      <span class="fax">FAX: 031-907-3854</span>
    </div>
    <div class="hd-sub">
      자료
      <input id="doc-date" type="text" placeholder="날짜">
      거래처 ·
      <input id="customer-name" type="text" value="창대통상" placeholder="거래처명">
    </div>
  </div>

  <div class="add-section" id="add-section">
    <input type="text" id="search-input" placeholder="➕ 품목명 검색해서 추가..." autocomplete="off" oninput="onSearch(this.value)"/>
    <div class="ac-list" id="ac-list"></div>
  </div>

  <div class="tbl-wrap">
    <table id="items-table">
      <thead>
        <tr id="thead-row">
          <th style="width:24px"></th>
          <th style="width:130px;text-align:left;">품목명</th>
          <th style="width:46px;">구분</th>
          <th style="width:70px;">납품가<br>(VAT별도)</th>
          <th style="width:50px;">박스수</th>
          <th style="width:50px;">박스당</th>
          <th style="width:55px;">납품량</th>
          <th style="width:70px;">공급가액</th>
          <th style="width:60px;">세액</th>
          <th class="th-final" style="width:80px;">장려금포함<br>부가세포함가</th>
          <th style="width:70px;">합계</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot>
        <tr class="sum-row-tr">
          <td colspan="7" class="lbl">공급가액 합계</td>
          <td colspan="2" class="val"><input id="sum-supply" readonly value="0" style="border:none;background:transparent;width:100%;text-align:right;font-weight:700;font-size:11px;outline:none;"/></td>
          <td colspan="2"></td>
        </tr>
        <tr class="sum-row-tr">
          <td colspan="7" class="lbl">세액 합계</td>
          <td colspan="2" class="val"><input id="sum-tax" readonly value="0" style="border:none;background:transparent;width:100%;text-align:right;font-weight:700;font-size:11px;outline:none;"/></td>
          <td colspan="2"></td>
        </tr>
        <tr class="grand-tr">
          <td colspan="7" class="lbl">총 합계</td>
          <td colspan="4" class="val"><input id="sum-total" readonly value="0"/></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="payment">
    <div class="pay-row">
      <div class="pay-box">
        <div class="lbl">현재 잔액</div>
        <input id="balance-inp" type="text" value="4,806,577" oninput="onBalanceInput(this)" onblur="onBalanceBlur(this)"/>원
      </div>
      <div class="pay-box dark">
        <div class="lbl">💰 총 입금 필요금액</div>
        <input id="required-inp" type="text" value="0" oninput="onRequiredManual(this)" onblur="onRequiredBlur(this)"/>원
      </div>
    </div>
    <div class="pay-note">※ 가상계좌 부여 완료 — CSM코드 입력 없이 바로 입금 가능합니다.</div>
    <div class="bank-row">
      <input id="bank-name" type="text" value="국민은행" placeholder="은행명"/>
      <input id="bank-acc" type="text" value="20429073002623" placeholder="계좌번호"/>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn btn-confirm" id="btn-confirm" onclick="confirmDoc()">✅ 확정</button>
    <button class="btn btn-edit"    id="btn-edit"    onclick="editDoc()">✏️ 수정하기</button>
    <button class="btn"             onclick="copyAll()">📋 복사</button>
    <button class="btn btn-img"     onclick="saveImage()">🖼️ 이미지</button>
    <button class="btn btn-share"   onclick="shareUrl()">🔗 공유</button>
  </div>
  <div class="btn-wrap">
    <button class="btn btn-excel"   onclick="exportExcel()">📊 엑셀 저장</button>
    <button class="btn btn-excel"   onclick="importExcel()">📂 엑셀 불러오기</button>
  </div>
</div>

function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function pn(v){return parseInt((String(v)||'0').replace(/,/g,''))||0;}

let requiredManual=false;

function updateRequired(){
  if(requiredManual) return;
  const total=pn(document.getElementById('sum-total').value);
  const balance=pn(document.getElementById('balance-inp').value);
  const req=total-balance;
  document.getElementById('required-inp').value=fmt(req<0?0:req);
}
function onBalanceInput(inp){
  const r=inp.value.replace(/[^0-9]/g,'');
  inp.value=r?parseInt(r).toLocaleString('ko-KR'):'';
  updateRequired();
}
function onBalanceBlur(inp){
  const r=inp.value.replace(/[^0-9]/g,'');
  inp.value=r?parseInt(r).toLocaleString('ko-KR'):'0';
  updateRequired();
}
function onRequiredManual(inp){
  requiredManual=true;
  const r=inp.value.replace(/[^0-9]/g,'');
  inp.value=r?parseInt(r).toLocaleString('ko-KR'):'';
}
function onRequiredBlur(inp){
  const r=inp.value.replace(/[^0-9]/g,'');
  inp.value=r?parseInt(r).toLocaleString('ko-KR'):'0';
}

function attachComma(inp){
  inp.addEventListener('focus',function(){
    const r=this.value.replace(/,/g,'');
    this.value=r==='0'?'':r;
  });
  inp.addEventListener('input',function(){
    const r=this.value.replace(/[^0-9]/g,'');
    this.value=r?parseInt(r).toLocaleString('ko-KR'):'';
  });
  inp.addEventListener('blur',function(){
    const r=this.value.replace(/[^0-9]/g,'');
    this.value=r?parseInt(r).toLocaleString('ko-KR'):'0';
    recalcRow(this);
  });
}

function recalcTotals(){
  let sup=0,tax=0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    sup+=pn(tr.querySelector('[data-r=sub]').value);
    tax+=pn(tr.querySelector('[data-r=vat]').value);
  });
  document.getElementById('sum-supply').value=fmt(sup);
  document.getElementById('sum-tax').value=fmt(tax);
  document.getElementById('sum-total').value=fmt(sup+tax);
  updateRequired();
}

function recalcRow(inp){
  const tr=inp.closest('tr');
  if(!tr) return;
  const g=r=>tr.querySelector('[data-r='+r+']');
  const price=pn(g('price').value);
  const boxes=pn(g('boxes').value);
  const perBox=pn(g('perBox').value);
  const qty=boxes*perBox;
  const sub=price*qty;
  const isVat=tr.dataset.vat==='과세';
  const vat=isVat?Math.round(sub*.1):0;
  const tot=sub+vat;
  g('qty').value=fmt(qty);
  g('sub').value=fmt(sub);
  g('vat').value=fmt(vat);
  g('tot').value=fmt(tot);
  const fi=g('final');
  if(!fi.dataset.manual){
    fi.value=price>0?fmt(Math.round(price*1.03)):'';
  }
  recalcTotals();
}

function makeRow(itemName,boxes,overrides){
  overrides=overrides||{};
  const d=DB.find(r=>r.name===itemName)||{vat:'과세',price:0,qty:1};
  const price=overrides.price!=null?overrides.price:d.price;
  const perBox=overrides.perBox!=null?overrides.perBox:d.qty;
  const vat=overrides.vat||d.vat;
  const qty=boxes*perBox;
  const sub=price*qty;
  const isVat=vat==='과세';
  const vatAmt=isVat?Math.round(sub*.1):0;
  const tot=sub+vatAmt;
  const defaultFinal=overrides.final!=null?overrides.final:(price>0?fmt(Math.round(price*1.03)):'');

  const tr=document.createElement('tr');
  tr.dataset.vat=vat;
  tr.innerHTML=`
    <td><button class="del-btn" onclick="delRow(this)">✕</button></td>
    <td class="name-cell">${itemName}</td>
    <td><span class="vat-badge vat-${vat}">${vat}</span></td>
    <td><input type="text" inputmode="numeric" value="${fmt(price)}" data-r="price"/></td>
    <td><input type="text" inputmode="numeric" value="${fmt(boxes)}" data-r="boxes"/></td>
    <td><input type="text" inputmode="numeric" value="${fmt(perBox)}" data-r="perBox"/></td>
    <td><input type="text" readonly value="${fmt(qty)}" data-r="qty"/></td>
    <td><input type="text" readonly value="${fmt(sub)}" data-r="sub"/></td>
    <td><input type="text" readonly value="${fmt(vatAmt)}" data-r="vat"/></td>
    <td class="td-final"><input type="text" inputmode="numeric" class="final-inp" value="${defaultFinal}" placeholder="납품가×1.03" data-r="final"/></td>
    <td class="td-total"><input type="text" readonly value="${fmt(tot)}" data-r="tot"/></td>`;

  tr.querySelectorAll('[data-r=price],[data-r=boxes],[data-r=perBox]').forEach(attachComma);

  const fi=tr.querySelector('[data-r=final]');
  if(overrides.finalManual) fi.dataset.manual='1';
  fi.addEventListener('focus',function(){
    const r=this.value.replace(/,/g,'');
    this.value=r==='0'?'':r;
  });
  fi.addEventListener('input',function(){
    this.dataset.manual='1';
    const r=this.value.replace(/[^0-9]/g,'');
    this.value=r?parseInt(r).toLocaleString('ko-KR'):'';
  });
  fi.addEventListener('blur',function(){
    const r=this.value.replace(/[^0-9]/g,'');
    this.value=r?parseInt(r).toLocaleString('ko-KR'):'';
  });
  fi.addEventListener('dblclick',function(){
    delete this.dataset.manual;
    const price=pn(tr.querySelector('[data-r=price]').value);
    this.value=price>0?fmt(Math.round(price*1.03)):'';
  });
  return tr;
}

function delRow(btn){
  const tr=btn.closest('tr');
  tr.style.opacity='0';tr.style.transition='opacity .2s';
  setTimeout(()=>{tr.remove();recalcTotals();},220);
}

function onSearch(val){
  const list=document.getElementById('ac-list');
  if(!val.trim()){list.style.display='none';return;}
  const kw=val.toLowerCase();
  const hits=DB.filter(r=>r.name.toLowerCase().includes(kw)).slice(0,10);
  if(!hits.length){list.style.display='none';return;}
  list.innerHTML=hits.map(r=>`<div onclick="addRow(this)" data-name="${r.name}">${r.name} <span style="color:#aaa;font-size:10px;">${fmt(r.price)}원</span></div>`).join('');
  list.style.display='block';
}
function addRow(el){
  const name=el.dataset.name;
  document.getElementById('search-input').value='';
  document.getElementById('ac-list').style.display='none';
  const tr=makeRow(name,1);
  tr.style.opacity='0';
  document.getElementById('tbody').appendChild(tr);
  setTimeout(()=>{tr.style.transition='opacity .25s';tr.style.opacity='1';},10);
  recalcTotals();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.add-section'))
    document.getElementById('ac-list').style.display='none';
});

// ── 엑셀 내보내기 ──
function exportExcel(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const customer=document.getElementById('customer-name').value;
  const bankName=document.getElementById('bank-name').value;
  const bankAcc=document.getElementById('bank-acc').value;
  const date=document.getElementById('doc-date').value;

  const aoa=[
    ['날짜',date,'거래처',customer,'잔액',pn(document.getElementById('balance-inp').value),'필요입금액',pn(document.getElementById('required-inp').value),'필요수동',requiredManual?1:0],
    ['은행명',bankName,'계좌번호',bankAcc],
    [],
    ['품목명','구분','납품가','박스수','박스당','납품량','공급가액','세액','장려금포함가','합계','장려금수동']
  ];

  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const fi=tr.querySelector('[data-r=final]');
    aoa.push([
      tr.querySelector('.name-cell').textContent.trim(),
      tr.dataset.vat,
      pn(tr.querySelector('[data-r=price]').value),
      pn(tr.querySelector('[data-r=boxes]').value),
      pn(tr.querySelector('[data-r=perBox]').value),
      pn(tr.querySelector('[data-r=qty]').value),
      pn(tr.querySelector('[data-r=sub]').value),
      pn(tr.querySelector('[data-r=vat]').value),
      fi.value?pn(fi.value):'',
      pn(tr.querySelector('[data-r=tot]').value),
      fi.dataset.manual?1:0
    ]);
  });

  const ws=XLSX.utils.aoa_to_sheet(aoa);
  // 열 너비 설정
  ws['!cols']=[{wch:16},{wch:4},{wch:8},{wch:8},{wch:6},{wch:6},{wch:8},{wch:10},{wch:10},{wch:12},{wch:12},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws,'입금표');
  const fname='오뚜기_입금표_'+date.replace(/\s/g,'')+'_'+customer+'.xlsx';
  XLSX.writeFile(wb,fname);
}

// ── 엑셀 불러오기 ──
function importExcel(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.xlsx,.xls';
  inp.onchange=async e=>{
    const file=e.target.files[0];
    if(!file) return;
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      const meta1=data[0]||[];
      const meta2=data[1]||[];
      // 메타 파싱: [날짜,val,거래처,val,잔액,val,필요입금,val,필요수동,val]
      document.getElementById('doc-date').value=meta1[1]||'';
      document.getElementById('customer-name').value=meta1[3]||'';
      document.getElementById('balance-inp').value=fmt(Number(meta1[5])||0);
      requiredManual=Number(meta1[9])===1;
      document.getElementById('required-inp').value=fmt(Number(meta1[7])||0);
      document.getElementById('bank-name').value=meta2[1]||'';
      document.getElementById('bank-acc').value=meta2[3]||'';

      // 품목 행 (행 index 4부터)
      const tb=document.getElementById('tbody');
      tb.innerHTML='';
      for(let i=4;i<data.length;i++){
        const row=data[i];
        if(!row[0]) continue;
        const [name,vat,price,boxes,perBox,,,,finalVal,,finalManual]=row;
        const tr=makeRow(String(name),Number(boxes)||1,{
          price:Number(price)||0,
          perBox:Number(perBox)||1,
          vat:vat||'과세',
          final:finalVal!==''?fmt(Number(finalVal)):null,
          finalManual:Number(finalManual)===1
        });
        tb.appendChild(tr);
      }
      recalcTotals();
      alert('엑셀 파일을 불러왔어요! ✅');
    }catch(err){
      alert('파일 읽기 실패: '+err.message);
    }
  };
  inp.click();
}

// ── 이미지 저장 ──
const isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1);

async function saveImage(){
  const overlay=document.getElementById('overlay');
  const ovTxt=document.getElementById('ov-txt');
  const hideEls=document.querySelectorAll('.btn-wrap,.add-section');
  const delBtns=document.querySelectorAll('.del-btn');

  overlay.classList.add('show');
  ovTxt.textContent='이미지 생성 중...';
  hideEls.forEach(el=>el.style.visibility='hidden');
  delBtns.forEach(b=>b.style.display='none');
  await new Promise(r=>setTimeout(r,200));

  const card=document.getElementById('main-card');
  const swaps=[];
  card.querySelectorAll('input').forEach(inp=>{
    const span=document.createElement('span');
    span.textContent=inp.value||inp.placeholder||'';
    span.style.cssText=`display:inline-block;font-size:${getComputedStyle(inp).fontSize};color:${inp.style.color||getComputedStyle(inp).color};font-weight:${getComputedStyle(inp).fontWeight};width:${inp.offsetWidth}px;`;
    inp.parentNode.insertBefore(span,inp);
    inp.style.display='none';
    swaps.push({inp,span});
  });
  await new Promise(r=>setTimeout(r,100));

  try{
    const canvas=await html2canvas(card,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#fff',scrollX:0,scrollY:-window.scrollY,logging:false});
    const date=document.getElementById('doc-date').value.replace(/\s/g,'');
    const customer=document.getElementById('customer-name').value;
    const filename=`오뚜기_입금표_${date}_${customer}.png`;
    const dataUrl=canvas.toDataURL('image/png');
    if(isMobile){
      const w=window.open('','_blank');
      if(w){
        w.document.write(`<html><head><title>${filename}</title></head><body style="margin:0;background:#000;"><img src="${dataUrl}" style="max-width:100%;"/></body></html>`);
        w.document.close();
        ovTxt.textContent='새 탭에서 이미지 길게 눌러 저장 ✅';
      } else {
        const a=document.createElement('a');a.href=dataUrl;a.download=filename;a.click();
        ovTxt.textContent='저장 완료! ✅';
      }
    } else {
      const a=document.createElement('a');a.download=filename;a.href=dataUrl;a.click();
      ovTxt.textContent='저장 완료! ✅';
    }
    await new Promise(r=>setTimeout(r,1200));
  }catch(e){
    alert('이미지 저장 실패: '+e.message);
  }finally{
    swaps.forEach(({inp,span})=>{inp.style.display='';span.remove();});
    hideEls.forEach(el=>el.style.visibility='');
    delBtns.forEach(b=>b.style.display='');
    overlay.classList.remove('show');
  }
}

// ── URL 공유 ──
function getState(){
  const rows=[];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const fi=tr.querySelector('[data-r=final]');
    rows.push({
      name:tr.querySelector('.name-cell').textContent.trim(),
      price:pn(tr.querySelector('[data-r=price]').value),
      boxes:pn(tr.querySelector('[data-r=boxes]').value),
      perBox:pn(tr.querySelector('[data-r=perBox]').value),
      vat:tr.dataset.vat,
      final:fi.value||'',
      finalManual:!!fi.dataset.manual
    });
  });
  return{
    date:document.getElementById('doc-date').value,
    customer:document.getElementById('customer-name').value,
    bankName:document.getElementById('bank-name').value,
    bankAcc:document.getElementById('bank-acc').value,
    balance:pn(document.getElementById('balance-inp').value),
    required:pn(document.getElementById('required-inp').value),
    requiredManual,rows
  };
}

function shareUrl(){
  const state=getState();
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  const url=location.origin+location.pathname+'#'+encoded;
  navigator.clipboard.writeText(url)
    .then(()=>alert('공유 링크가 클립보드에 복사됐어요!\n다른 기기에서 이 링크를 열면 현재 내용이 그대로 불러와집니다.'))
    .catch(()=>prompt('아래 링크를 복사하세요:',url));
}

function loadFromHash(){
  const hash=location.hash.slice(1);
  if(!hash) return false;
  try{
    const state=JSON.parse(decodeURIComponent(escape(atob(hash))));
    if(state.date) document.getElementById('doc-date').value=state.date;
    if(state.customer) document.getElementById('customer-name').value=state.customer;
    if(state.bankName) document.getElementById('bank-name').value=state.bankName;
    if(state.bankAcc) document.getElementById('bank-acc').value=state.bankAcc;
    if(state.balance!=null) document.getElementById('balance-inp').value=fmt(state.balance);
    if(state.requiredManual){
      requiredManual=true;
      document.getElementById('required-inp').value=fmt(state.required);
    }
    const tb=document.getElementById('tbody');
    tb.innerHTML='';
    (state.rows||[]).forEach(r=>{
      const tr=makeRow(r.name,r.boxes,{
        price:r.price,perBox:r.perBox,vat:r.vat,
        final:r.final||null,finalManual:r.finalManual
      });
      tb.appendChild(tr);
    });
    recalcTotals();
    return true;
  }catch(e){console.error('URL 복원 실패',e);return false;}
}

// ── 열 크기 조정 핸들 ──
function initColResize(){
  document.querySelectorAll('#thead-row th').forEach(th=>{
    const handle=document.createElement('div');
    handle.className='col-resize';
    th.appendChild(handle);
    let startX,startW;

    function onMove(x){th.style.width=Math.max(30,startW+x-startX)+'px';}
    function onUp(){
      document.removeEventListener('mousemove',mmove);
      document.removeEventListener('mouseup',mup);
      document.removeEventListener('touchmove',tmove);
      document.removeEventListener('touchend',tup);
    }
    const mmove=e=>onMove(e.pageX);
    const mup=onUp;
    const tmove=e=>{e.preventDefault();onMove(e.touches[0].pageX);};
    const tup=onUp;

    handle.addEventListener('mousedown',e=>{
      startX=e.pageX;startW=th.offsetWidth;
      document.addEventListener('mousemove',mmove);
      document.addEventListener('mouseup',mup);
      e.preventDefault();
    });
    handle.addEventListener('touchstart',e=>{
      startX=e.touches[0].pageX;startW=th.offsetWidth;
      document.addEventListener('touchmove',tmove,{passive:false});
      document.addEventListener('touchend',tup);
    },{passive:true});
  });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

window.onload=()=>{
  initColResize();
  const loaded=loadFromHash();
  if(!loaded){
    const tmr=new Date();
    tmr.setDate(tmr.getDate()+1);
    document.getElementById('doc-date').value=(tmr.getMonth()+1)+'월 '+tmr.getDate()+'일';
    const tb=document.getElementById('tbody');
    INITIAL.forEach(it=>tb.appendChild(makeRow(it.name,it.boxes)));
    recalcTotals();
  }
};
